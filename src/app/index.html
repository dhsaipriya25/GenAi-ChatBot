<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gen AI Chatbot</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Gen AI Chatbot — Configure and launch your own AI-powered chatbot using OpenAI or Gemini.">
  <meta name="theme-color" content="#00204d">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background-color: #00204d;
      color: #f0f4f8;
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════
       SPLASH / LOADER
    ══════════════════════════════ */
    #page-loader {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 60% 40%, #0a2d6e 0%, #00204d 50%, #000d1f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      overflow: hidden;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }

    #page-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ── Floating particles ── */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
    }

    /* ── Glowing ring ── */
    .loader-ring {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
    }

    .loader-ring::before,
    .loader-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .loader-ring::before {
      border: 2px solid rgba(56, 189, 248, 0.15);
    }

    .loader-ring::after {
      border: 3px solid transparent;
      border-top-color: #38bdf8;
      border-right-color: #818cf8;
      animation: spin 1.2s linear infinite;
    }

    .loader-ring-inner {
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: #38bdf8;
      border-left-color: #c084fc;
      animation: spin 0.8s linear infinite reverse;
    }

    .loader-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      animation: pulse-icon 2s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse-icon {
      0%, 100% { transform: scale(1);   filter: drop-shadow(0 0 6px #38bdf8); }
      50%       { transform: scale(1.1); filter: drop-shadow(0 0 16px #818cf8); }
    }

    /* ── Brand text ── */
    .loader-brand {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 30%, #38bdf8 60%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3rem;
      animation: shimmer 3s ease-in-out infinite;
      background-size: 200% auto;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      50%  { background-position: 100% center; }
      100% { background-position: 0% center; }
    }

    .loader-tagline {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2.5rem;
    }

    /* ── Progress bar ── */
    .loader-progress-wrap {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .loader-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc);
      border-radius: 99px;
      animation: progress 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      box-shadow: 0 0 10px #38bdf8;
    }

    @keyframes progress {
      0%   { width: 0%; }
      40%  { width: 60%; }
      70%  { width: 80%; }
      100% { width: 97%; }
    }

    .loader-status {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      animation: blink-status 1.5s ease-in-out infinite;
    }

    @keyframes blink-status {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.8; }
    }

    /* ── Grid overlay ── */
    .loader-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #001333; }
    ::-webkit-scrollbar-thumb { background: #1a3f72; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #38bdf8; }

    /* ── Focus ring ── */
    :focus-visible {
      outline: 2px solid #38bdf8;
      outline-offset: 2px;
    }
  </style>
</head>
<body>

  <!-- ══ Splash Screen ══ -->
  <div id="page-loader">

    <!-- Grid background -->
    <div class="loader-grid"></div>

    <!-- Floating particles (generated by JS below) -->
    <div class="particles" id="particles"></div>

    <!-- Spinning ring with bot icon -->
    <div class="loader-ring">
      <div class="loader-ring-inner"></div>
      <div class="loader-icon">🤖</div>
    </div>

    <!-- Brand -->
    <div class="loader-brand">Gen AI Chatbot</div>
    <div class="loader-tagline">Powered by OpenAI &amp; Gemini</div>

    <!-- Progress -->
    <div class="loader-progress-wrap">
      <div class="loader-progress-bar"></div>
    </div>
    <div class="loader-status">Initializing...</div>

  </div>

  <app-root></app-root>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    /* ── Generate particles ── */
    (function () {
      var container = document.getElementById('particles');
      var colors = ['#38bdf8', '#818cf8', '#c084fc', '#34d399', '#ffffff'];
      for (var i = 0; i < 30; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        var size = Math.random() * 4 + 2;
        p.style.cssText = [
          'width:'  + size + 'px',
          'height:' + size + 'px',
          'left:'   + Math.random() * 100 + '%',
          'background:' + colors[Math.floor(Math.random() * colors.length)],
          'animation-duration:' + (Math.random() * 8 + 6) + 's',
          'animation-delay:'    + (Math.random() * 6) + 's',
          'filter: blur(' + (Math.random() > 0.5 ? '1px' : '0px') + ')'
        ].join(';');
        container.appendChild(p);
      }
    })();

    /* ── Hide loader once Angular renders ── */
    (function () {
      function hideLoader() {
        var loader = document.getElementById('page-loader');
        if (loader) loader.classList.add('hidden');
      }

      var observer = new MutationObserver(function () {
        var root = document.querySelector('app-root');
        if (root && root.innerHTML.trim() !== '') {
          hideLoader();
          observer.disconnect();
        }
      });

      observer.observe(document.body, { childList: true, subtree: true });
      setTimeout(hideLoader, 4000);
    })();
  </script>

</body>
</html>
